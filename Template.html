      xmlns:v="urn:schemas-microsoft-com:vml">

<head>

    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />

    <style type="text/css">
        #poReleaseRequestConfirmation {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

            #poReleaseRequestConfirmation td,
            #poReleaseRequestConfirmation th {
                border: 1px solid #ddd;
                padding: 8px;
                width: 50%;
            }

            #poReleaseRequestConfirmation tr:nth-child(even) {
                background-color: #f2f2f2;
            }

            #poReleaseRequestConfirmation tr:hover {
                background-color: #ddd;
            }

            #poReleaseRequestConfirmation th {
                padding-top: 12px;
                padding-bottom: 12px;
                text-align: left;
                background-color: #d4272e;
                color: white;
            }
        #styled-table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            margin-bottom: 10px;
            width: 100%;
        }

            #styled-table td,
            #styled-table th {
                border: 1px solid #d3d3d3;
                padding: 4px;
                padding-left: 8px;
            }

            #styled-table tr:nth-child(even) {
                /*background-color: #f2f2f2;*/
            }

            #styled-table tr:hover {
                /*<!-- background-color: #ddd; -->*/
            }

            #styled-table thead tr th {
                text-align: left;
                background-color: #3c3a3a;
                color: white;
                background-color: #d4272e;
            }
    </style>
</head>

<body>
    <p id="poReleaseRequestConfirmation">
        {Message}
    </p>
    <LineItemInformation></LineItemInformation>
</body>
</html>
